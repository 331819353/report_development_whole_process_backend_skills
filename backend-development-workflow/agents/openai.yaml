interface:
  display_name: "数据服务/后端 Workflow"
  short_description: "编排数据服务/后端阶段，消费 prototype targeted reading、PRD 执行包和 docs/prototype-data-summary.md，产出数据服务设计、API 文档或后端接口实现，覆盖 mock-to-real 替换矩阵、最简接口实现、Python/Flask、SSO、多数据库、查询链路、契约校验、数值精度、数据转换、权限、Redis/连接池、ApiError释放、性能、观测、部署和URL验证。"
  default_prompt: "Use $backend-development-workflow to orchestrate data-service/backend design, API documentation, or implementation. For table-backed implementation, apply minimal interface principles first: inspect each table's content, make filters request params mapped to source predicates, default to source-query-simple, and avoid hidden joins, aggregation, exact counts, formulas, totals, rankings, or broad in-memory processing. For prototype-derived report work, first consume prd/execution/prd-targeted-reading-analysis.md, the PRD execution bundle, docs/prototype-data-summary.md, Mock API To HTTP API Replacement Matrix, and Metric To Interface / Source Mapping; cite relevant SRC-* / READ-* / ENTRY-* / GAP-* rows and preserve component data keys, filters, interactions, toolbar actions, exports, detail/drilldown payloads, conclusion-rule inputs, numeric metadata, and empty/error/no-permission states. Then apply Python/Flask/SQLAlchemy SSO and multi-database standards when applicable, query-service architecture, contracts, transformations, permissions, sidecar code ledgers read-before-edit and append-after-edit, Redis/pools, ApiError/timeout connection release, structured backend logging, performance, observability, deployment, and URL verification."
