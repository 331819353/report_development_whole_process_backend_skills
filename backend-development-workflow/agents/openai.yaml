interface:
  display_name: "数据服务/后端 Workflow"
  short_description: "独立新建或维护真实后端服务；有 prototype 时消费契约，无 prototype 时直接从需求和数据源开发。"
  default_prompt: "Use $backend-development-workflow as an independent real-backend entry point. First classify backendEntryMode as standalone-new-project, existing-project, or prototype-derived. Never require or generate a prototype merely because none exists. For standalone-new-project, read references/01-standalone-new-project-contract.md, initialize the actual runnable service, create standaloneBackendBaseline, serviceBoundaryMatrix, apiContractMatrix, sourceObjectUnderstandingMatrix, requestParamPredicateMatrix, and implementationVerificationMatrix, then implement vertical slices with tests, auth/errors, logging, health and runtime smoke. For existing-project, preserve repository conventions. Only for prototype-derived work read references/00-prototype-downstream-handoff-contract.md and enforce its PRD/data trace and mock replacement matrices. In every mode inspect source objects first, expose client filters as request params, and keep simple retrieval query-only without hidden aggregation."
