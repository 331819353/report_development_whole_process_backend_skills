interface:
  display_name: "Python Flask后端架构"
  short_description: "按 Python + Flask + SQLAlchemy + SSO + SQLite/MySQL/Oracle/StarRocks 沉淀后端项目架构、目录结构、鉴权、多数据库和最简接口实现约定。"
  default_prompt: "Use $python-flask-sso-multidatabase-backend to initialize, develop, or review a real Python Flask backend. It can run directly for backendEntryMode=standalone-new-project and must not require a prototype: create the runnable layered service, configuration profiles, auth/error handling, health endpoint, tests, build/deploy entrypoints, and source/API contracts. For existing projects preserve repository conventions; for prototype-derived work consume the upstream contract. For table-backed routes, inspect table content first, map filters as request params/source predicates, keep repositories query-only for simple retrieval, and avoid hidden joins, aggregation, exact counts, formulas, totals, rankings, or broad in-memory processing."
