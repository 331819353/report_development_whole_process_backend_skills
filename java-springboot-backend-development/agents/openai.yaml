interface:
  display_name: "Java SpringBoot后端开发"
  short_description: "沉淀 Spring Boot 后端目录、分层、统一响应、异常、JWT/SSO、Profile、Maven/Docker 和最简接口实现约定。"
  default_prompt: "Use $java-springboot-backend-development to initialize, develop, or review a real Java Spring Boot backend. It can run directly for backendEntryMode=standalone-new-project and must not require a prototype: create the runnable layered service, unified response/errors, profiles, auth, health endpoint, tests, Maven/Docker entrypoints, and source/API contracts. For existing projects preserve repository conventions; for prototype-derived work consume the upstream contract. For table-backed APIs, inspect table content first, make filters request DTO/query params mapped to source predicates, keep mapper/repository paths query-only for simple retrieval, and avoid hidden joins, aggregation, exact counts, formulas, totals, rankings, or broad service-side processing."
