interface:
  display_name: "质量门禁校验"
  short_description: "执行开工前理解、行动前自省、反懒性、设计合理性、最简接口、现代SaaS/BI Dashboard风格、数值精度、视觉运行、代码变更、生产就绪和交付链路质量门禁。"
  default_prompt: "Use $quality-gate-validation to run the smallest required readiness gate across requirements, design, modern SaaS / BI Dashboard / UI Kit style-contract readiness, numeric precision/display contracts, data/API/model, frontend/backend code, runtime QA, environment, production readiness, and delivery handoff. For backend/API work, check minimal interface evidence: table content first, filters as request params mapped to source predicates, source-query-simple boundaries, and no hidden joins, aggregation, exact counts, formulas, totals, rankings, or broad processing unless a derived/summary exception exists. For non-trivial implementation, repair, QA, acceptance, or handoff, use the preflight understanding gate, action reflection, and anti-laziness execution gate before readiness."
