interface:
  display_name: "API 清单设计"
  short_description: "从需求、模型、prototype 数据摘要、mock-to-real 矩阵、前后端契约和测试发现设计接口清单"
  default_prompt: "Use $api-inventory-design to design a reusable API inventory from requirements, metrics, data models, frontend/backend contracts, prd/execution/prd-targeted-reading-analysis.md, prototype PRD execution files, docs/prototype-data-summary.md, Mock API To HTTP API Replacement Matrix, and Metric To Interface / Source Mapping. Preserve SRC-* / READ-* / ENTRY-* / GAP-* rows, component data keys, filters, interactions, actions, exports, detail/drilldown payloads, and conclusion-rule inputs as backend API coverage obligations."
