interface:
  display_name: "数据转换与响应适配"
  short_description: "设计源数据到 API 响应、API 响应到前端视图模型的字段映射、兼容适配、数值精度、单位缩放、枚举日期和默认值规则；聚合派生仅作为明确例外处理。"
  default_prompt: "Use $data-transformation-adapter-design to design backend data transformations and frontend response adapters between source payloads, API contracts, UI view models, numeric precision/display contracts, and targeted reading rows from prd/execution/prd-targeted-reading-analysis.md when PRD/prototype-derived work is in scope. For simple backend interfaces, keep adapters to aliases, serialization, masking, null handling, and compatibility; do not hide missing request params, joins, aggregation, formulas, totals, rankings, or broad reshaping."
